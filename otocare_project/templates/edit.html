<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Data Unit - OtoCare</title>
    <!-- Bootstrap 5 & Google Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #fafafa; 
            color: #111111; 
            letter-spacing: -0.01em;
        }
        .navbar-clean {
            background: #ffffff;
            border-bottom: 1px solid #eaeaea;
        }
        .panel-card {
            background: #ffffff;
            border: 1px solid #eaeaea;
            border-radius: 12px;
            padding: 32px;
        }
        .form-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #555555;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .form-control, .form-select {
            border: 1px solid #eaeaea;
            border-radius: 8px;
            padding: 11px 14px;
            font-size: 0.9rem;
            background-color: #fff;
            color: #111;
            transition: all 0.2s ease;
        }
        .form-control:focus, .form-select:focus {
            border-color: #111111;
            box-shadow: none;
        }
        .btn-dark-modern {
            background: #111111;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .btn-dark-modern:hover {
            background: #2a2a2a;
        }
        .sector-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #888888;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <nav class="navbar navbar-clean py-3 mb-5">
        <div class="container">
            <a href="/" class="text-decoration-none text-dark small fw-medium">
                <i class="bi bi-arrow-left me-2"></i> Batalkan & Kembali
            </a>
            <span class="text-muted small fw-semibold text-uppercase tracking-wider">Modul Pembaruan Data</span>
        </div>
    </nav>

    <div class="container" style="max-width: 700px;">
        <div class="panel-card mb-5">
            <div class="d-flex align-items-center gap-2 mb-4">
                <i class="bi bi-pencil-square fs-4"></i>
                <h4 class="fw-bold m-0" style="letter-spacing: -0.02em;">Perbarui Parameter Unit</h4>
            </div>
            
            <form action="/edit/{{ motor.id }}" method="POST">
                
                <!-- Identitas Utama -->
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Nama / Seri Motor</label>
                        <input type="text" name="nama" class="form-control" value="{{ motor.nama }}" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Nomor Plat</label>
                        <input type="text" name="plat" class="form-control" value="{{ motor.plat }}" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Transmisi</label>
                        <select name="jenis" class="form-select">
                            <option value="Matic" {% if motor.jenis == 'Matic' %}selected{% endif %}>Matic (CVT)</option>
                            <option value="Manual/Bebek" {% if motor.jenis != 'Matic' %}selected{% endif %}>Manual / Rantai</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Odometer Saat Ini (KM)</label>
                    <input type="number" name="km_sekarang" class="form-control" value="{{ motor.km_sekarang }}" required>
                </div>

                <hr class="my-4" style="border-color: #eaeaea;">
                
                <!-- Sektor 1 -->
                <div class="mb-4">
                    <div class="sector-title mb-2">Sektor 1: Pelumasan (Oli Mesin)</div>
                    <div class="row g-2">
                        <div class="col-6">
                            <input type="date" name="tgl_oli" class="form-control" value="{{ motor.tgl_oli }}" required>
                        </div>
                        <div class="col-6">
                            <input type="number" name="km_oli" class="form-control" value="{{ motor.km_oli }}" placeholder="Odometer saat ganti oli" required>
                        </div>
                    </div>
                </div>

                <!-- Sektor 2 -->
                <div class="mb-4">
                    <div class="sector-title mb-2">Sektor 2: Mesin & Pengapian (Tune-Up)</div>
                    <div class="row g-2">
                        <div class="col-6">
                            <input type="date" name="tgl_mesin" class="form-control" value="{{ motor.tgl_mesin }}" required>
                        </div>
                        <div class="col-6">
                            <input type="number" name="km_mesin" class="form-control" value="{{ motor.km_mesin }}" placeholder="Odometer saat tune-up" required>
                        </div>
                    </div>
                </div>

                <!-- Sektor 3 -->
                <div class="mb-4">
                    <div class="sector-title mb-2">Sektor 3: Komponen Penggerak (CVT / Rantai)</div>
                    <div class="row g-2">
                        <div class="col-6">
                            <input type="date" name="tgl_cvt" class="form-control" value="{{ motor.tgl_cvt }}" required>
                        </div>
                        <div class="col-6">
                            <input type="number" name="km_cvt" class="form-control" value="{{ motor.km_cvt }}" placeholder="Odometer saat ganti komponen" required>
                        </div>
                    </div>
                </div>

                <!-- Sektor 4 -->
                <div class="mb-4">
                    <div class="sector-title mb-2">Sektor 4: Pengendalian & Pengaman (Sistem Rem)</div>
                    <div class="row g-2">
                        <div class="col-6">
                            <input type="date" name="tgl_kaki" class="form-control" value="{{ motor.tgl_kaki }}" required>
                        </div>
                        <div class="col-6">
                            <input type="number" name="km_kaki" class="form-control" value="{{ motor.km_kaki }}" placeholder="Odometer saat ganti rem" required>
                        </div>
                    </div>
                </div>

                <!-- Sektor 5 -->
                <div class="mb-4">
                    <div class="sector-title mb-2">Sektor 5: Kelistrikan & Pasokan Aki</div>
                    <div class="row g-2">
                        <div class="col-6">
                            <input type="date" name="tgl_listrik" class="form-control" value="{{ motor.tgl_listrik }}" required>
                        </div>
                        <div class="col-6">
                            <input type="number" name="km_listrik" class="form-control" value="{{ motor.km_listrik }}" placeholder="Odometer saat cek kelistrikan" required>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-5">
                    <a href="/" class="btn btn-light border px-4" style="border-radius: 8px; font-size: 0.9rem;">Batal</a>
                    <button type="submit" class="btn btn-dark-modern px-4">Simpan Perubahan</button>
                </div>

            </form>
        </div>
    </div>

</body>
</html>
